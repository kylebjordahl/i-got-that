name: caretaker_app
description: Caretaker Calendar Platform — family logistics planner (iOS + web).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # API access + state management (used as screens are built out in Phase 5).
  dio: ^5.7.0
  flutter_riverpod: ^2.6.0
  # Persists the session token in the iOS Keychain (and platform-equivalent on
  # web/other targets) so login survives app restarts.
  flutter_secure_storage: ^9.2.2
  package_info_plus: ^8.1.0
  sign_in_with_apple: ^6.0.0
  # Receives invite deep links: iOS Universal Links (cold-start + warm) and the
  # web launch URL, both surfaced as URIs we parse for `?invite=`.
  app_links: ^6.3.0
  # Native share sheet for handing off the invite URL (Messages, Mail, …).
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Round-5 redesign fonts. These are variable TTFs (one file per family with a
  # `wght` axis); the app theme picks weights via FontVariation('wght', …).
  fonts:
    - family: Hanken Grotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk.ttf
    - family: Schibsted Grotesk
      fonts:
        - asset: assets/fonts/SchibstedGrotesk.ttf
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat.ttf

# Per-environment app identity. Only the iOS bundle id differs today (there's no
# Android target yet); the Dart-side per-env config is threaded via --dart-define
# (see state/auth.dart). The generated iOS build configs + schemes are committed
# under ios/; regenerate after editing flavors with flutter_flavorizr (not a
# project dependency — activate it on demand):
#   dart pub global activate flutter_flavorizr
#   dart pub global run flutter_flavorizr -p ios:xcconfig,ios:buildTargets,ios:schema
flavorizr:
  flavors:
    staging:
      app:
        name: "IGT Staging"
      ios:
        bundleId: "com.kylebjordahl.igt.staging"
    prod:
      app:
        name: "IGT"
      ios:
        bundleId: "com.kylebjordahl.igt"
