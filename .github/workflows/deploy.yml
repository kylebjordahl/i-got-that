name: Deploy (reusable)

# Reusable deployment: provision durable infra (Terraform), apply D1 migrations,
# and deploy the Worker (Wrangler) for a given environment. Called by
# deploy-staging.yml (after CI passes on main) and deploy-production.yml
# (release published).
#
# `environment` (staging | production) drives every derived value (wrangler env
# key, D1 name, TF backend). `ref` optionally pins the commit to deploy.

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment — "staging" or "production"
        required: true
        type: string
      ref:
        description: >-
          Git ref/SHA to check out and deploy. Defaults to the standard
          checkout ref. Staging passes the exact commit that passed CI so a
          later push to main can't sneak an unvalidated commit into deploy.
        required: false
        type: string
        default: ""
    outputs:
      build_name:
        description: >-
          Marketing version computed by the `version` job (see below) for
          this run — the same value embedded in the iOS/web builds. Exposed
          so deploy-staging.yml can keep a draft release's tag in sync with
          it without re-deriving the version itself.
        value: ${{ jobs.version.outputs.build_name }}
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      # iOS TestFlight signing/upload, used by the `testflight` job for both
      # environments (staging/prod each have their own profile secret below).
      # Optional so a caller that doesn't do TestFlight yet still validates.
      IOS_DIST_CERT_P12_BASE64:
        required: false
      IOS_DIST_CERT_PASSWORD:
        required: false
      IOS_STAGING_PROFILE_BASE64:
        required: false
      IOS_PROD_PROFILE_BASE64:
        required: false
      APP_STORE_CONNECT_KEY_ID:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_API_KEY_P8:
        required: false

jobs:
  # Computed once and shared via job outputs, rather than in the `deploy` and
  # `testflight` jobs separately: those build on different runners (ubuntu vs
  # macOS) and can't share step outputs directly, but the web client and the
  # iOS app must embed the exact same marketing version for a given workflow
  # run.
  version:
    name: Determine app version
    runs-on: ubuntu-latest
    outputs:
      build_name: ${{ steps.version.outputs.build_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          # Full history + tags: derivation below needs to walk commits since
          # the last tag (staging) or find the tag on this exact commit
          # (production), neither of which a shallow clone can do.
          fetch-depth: 0

      # Marketing version (`--build-name` / CFBundleShortVersionString on
      # iOS; the `version` field of the web client's `version.json`):
      # - production always ships the exact version of the GitHub Release that
      #   triggered this deploy — that release's tag is always present on the
      #   released commit.
      # - staging deploys ahead of any release, so it guesses the *next*
      #   version by bumping the latest tag according to Conventional Commits
      #   (`feat` -> minor, `fix`/other -> patch, `!` or `BREAKING CHANGE` ->
      #   major) found since that tag. When that can't be determined
      #   semantically — no tag yet, or nothing since it is in Conventional
      #   Commits form — it falls back to plain `git describe` form: the last
      #   tag plus the commit count and short hash since it (with `0.0.0`
      #   standing in for "no tag yet").
      - name: Determine app version
        id: version
        uses: actions/github-script@v7
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        with:
          script: |
            const environment = process.env.ENVIRONMENT;

            const git = async (...args) => {
              const { stdout } = await exec.getExecOutput('git', args, { ignoreReturnCode: true });
              return stdout.trim();
            };

            const latestTag = await git('describe', '--tags', '--abbrev=0');
            let buildName;

            if (environment === 'production') {
              const tagsOnHead = (await git('tag', '--points-at', 'HEAD')).split('\n').filter(Boolean);
              const releaseTag = tagsOnHead.find((t) => /^v?\d+\.\d+\.\d+/.test(t));
              if (!releaseTag) {
                core.setFailed(`No version tag found on the released commit (${await git('rev-parse', 'HEAD')}).`);
                return;
              }
              buildName = releaseTag.replace(/^v/, '');
              core.info(`Production build name: ${buildName} (from release tag ${releaseTag})`);
            } else {
              const baseVersion = latestTag.replace(/^v/, '') || '0.0.0';
              const logRange = latestTag ? `${latestTag}..HEAD` : 'HEAD';
              const subjects = await git('log', logRange, '--format=%s');

              let bump = '';
              if (latestTag && subjects) {
                if (/^[a-z]+(\(.+\))?!:/m.test(subjects) || /BREAKING CHANGE/.test(subjects)) {
                  bump = 'major';
                } else if (/^feat(\(.+\))?:/m.test(subjects)) {
                  bump = 'minor';
                } else if (/^fix(\(.+\))?:/m.test(subjects)) {
                  bump = 'patch';
                }
              }

              if (bump) {
                const [major, minor, patch] = baseVersion.split('.').map(Number);
                buildName = bump === 'major' ? `${major + 1}.0.0`
                  : bump === 'minor' ? `${major}.${minor + 1}.0`
                  : `${major}.${minor}.${patch + 1}`;
                core.info(`Staging build name: ${buildName} (next ${bump} version after ${latestTag})`);
              } else {
                const commitCount = await git('rev-list', logRange, '--count');
                const shortHash = await git('rev-parse', '--short', 'HEAD');
                buildName = `${baseVersion}-${commitCount}-g${shortHash}`;
                core.info(`Staging build name: ${buildName} (no semantic bump determinable since ${latestTag || 'the start of history'})`);
              }
            }

            core.setOutput('build_name', buildName);

  deploy:
    name: Deploy → ${{ inputs.environment }}
    needs: version
    runs-on: ubuntu-latest
    # Binds to the GitHub Environment — add required reviewers there to gate
    # production behind a manual approval.
    environment: ${{ inputs.environment }}
    # Everything else is derived from `environment` (staging | production).
    env:
      WRANGLER_ENV: "${{ inputs.environment }}"
      D1_DATABASE: "igt-${{ inputs.environment == 'production' && 'prod' || 'staging' }}"
      TF_BACKEND: "backend.${{ inputs.environment }}.hcl"
    steps:
      - name: Validate environment
        run: |
          if [ "$WRANGLER_ENV" != "staging" ] && [ "$WRANGLER_ENV" != "production" ]; then
            echo "::error::environment must be 'staging' or 'production' (got '$WRANGLER_ENV')."
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/pnpm-install

      # Build the Flutter web client and stage it under apps/api/public/app so
      # the Worker serves it (same origin) at /app. API base is the relative
      # /api on that origin. The built bundle is cached and keyed on the mobile
      # sources *and the environment* (APP_ENV is baked into the bundle — it
      # drives the staging-only beta ribbon — so the two envs must never share a
      # cache entry): a backend/infra-only deploy restores it and skips the
      # Flutter SDK download + web build (the slowest part of the deploy). Only
      # a change under apps/mobile busts the cache and triggers a rebuild. The
      # marketing version and build number are *not* part of the cache key —
      # see "Stamp web client version" below, which re-embeds this run's
      # values on every deploy regardless of cache hit/miss.
      - name: Restore built web client
        id: web-client-cache
        uses: actions/cache@v6
        with:
          path: apps/api/public/app
          key: >-
            web-client-${{ inputs.environment }}-${{ hashFiles('apps/mobile/lib/**',
            'apps/mobile/web/**', 'apps/mobile/pubspec.yaml', 'apps/mobile/pubspec.lock') }}
      - uses: subosito/flutter-action@v2
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        with:
          channel: stable
          cache: true
      - name: Build web client
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: |
          flutter create . --platforms=web --project-name caretaker_app
          flutter pub get
          flutter build web --base-href /app/ --dart-define=API_BASE_URL=/api \
            --dart-define=APP_ENV=${{ inputs.environment }} \
            --build-name=${{ needs.version.outputs.build_name }} \
            --build-number=${{ github.run_number }}
      - name: Stage web assets
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf apps/api/public/app
          mkdir -p apps/api/public
          cp -r apps/mobile/build/web apps/api/public/app
      # Runs whether the bundle was rebuilt or restored from cache — the Worker
      # must never deploy without its web assets.
      - name: Verify web assets present
        run: |
          if [ ! -f apps/api/public/app/index.html ]; then
            echo "::error::Web assets missing: apps/api/public/app/index.html not found." \
                 "Neither the cache restore nor the Flutter build produced the web" \
                 "client — the Worker would deploy without it. Failing early."
            exit 1
          fi
          echo "Serving $(find apps/api/public/app -type f | wc -l) web asset file(s)."

      # Runs unconditionally, even on a cache hit: `flutter build web` bakes
      # the marketing version + build number into this one small JSON file
      # (fetched at runtime by package_info_plus, not compiled into the JS/wasm
      # bundle), so it's cheap to re-stamp on every deploy without forcing a
      # full rebuild — keeping the web client's displayed version identical to
      # this run's TestFlight build (`testflight` job below) even when the
      # compiled bundle itself is stale/reused.
      - name: Stamp web client version
        run: |
          cat > apps/api/public/app/version.json <<JSON
          {"app_name":"caretaker_app","package_name":"caretaker_app","version":"${{ needs.version.outputs.build_name }}","build_number":"${{ github.run_number }}"}
          JSON

      - uses: hashicorp/setup-terraform@v4
      - name: Terraform apply (${{ inputs.environment }} infra)
        working-directory: infra/terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_environment: ${{ inputs.environment }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init -backend-config="$TF_BACKEND"
          terraform apply -auto-approve

      - name: Apply D1 migrations + deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm wrangler d1 migrations apply "$D1_DATABASE" --env "$WRANGLER_ENV" --remote
          pnpm wrangler deploy --env "$WRANGLER_ENV"

  # Building/signing/uploading in `testflight` below is the expensive part of
  # deploying to TestFlight (and the reason that job needs macOS runners), so
  # decide whether it's needed on a cheap ubuntu runner first. Nx-affected is
  # base/head aware (unlike a plain path grep) and understands the project
  # graph, so it correctly catches mobile changes spread across several
  # commits, not just the most recent one.
  check-mobile-changed:
    name: Check for mobile app changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      changed: ${{ steps.mobile-changed.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          # Full history: the last successful TestFlight build may be many
          # commits back, and Nx needs both ends of the range locally.
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-install

      # Walk this environment's "Deploy <env>" runs newest-first and find the
      # most recent one whose `testflight` job actually succeeded (as opposed
      # to no-op'd — see the job-level `if` below, a no-op reports as
      # skipped, not success). That run's commit is the last point we know
      # TestFlight is up to date, so it's the right base for the Nx-affected
      # diff below. Staging and production are tracked independently (each
      # has its own "deploy-<env>.yml" caller workflow and its own last
      # successful build), since they archive/upload on very different
      # cadences.
      - name: Find commit of last successful TestFlight build
        id: base-sha
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          BASE_SHA=""
          for run_id in $(gh api "repos/${REPO}/actions/workflows/deploy-${ENVIRONMENT}.yml/runs?status=completed&per_page=30" --jq '.workflow_runs[].id'); do
            conclusion=$(gh api "repos/${REPO}/actions/runs/${run_id}/jobs" \
              --jq "[.jobs[] | select(.name | endswith(\"TestFlight → ${ENVIRONMENT}\"))][0].conclusion // empty")
            if [ "$conclusion" = "success" ]; then
              BASE_SHA=$(gh api "repos/${REPO}/actions/runs/${run_id}" --jq '.head_sha')
              break
            fi
          done
          if [ -z "$BASE_SHA" ]; then
            echo "No prior successful TestFlight build found — building unconditionally."
          else
            echo "Last successful TestFlight build was for commit $BASE_SHA."
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Check whether mobile is Nx-affected since that build
        id: mobile-changed
        run: |
          set -euo pipefail
          BASE_SHA="${{ steps.base-sha.outputs.base_sha }}"
          if [ -z "$BASE_SHA" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD_SHA="$(git rev-parse HEAD)"
          affected=$(pnpm exec nx show projects --affected --base="$BASE_SHA" --head="$HEAD_SHA" --json)
          echo "Nx-affected projects since $BASE_SHA: $affected"
          if echo "$affected" | jq -e 'index("mobile") != null' > /dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "mobile is not Nx-affected since the last successful TestFlight build — skipping."
          fi

  # Archives, signs, and uploads the mobile app's flavor for this environment
  # to TestFlight. Needs macOS for Xcode/codesign, so it's a separate job from
  # `deploy` (which stays on ubuntu-latest) rather than an extra step there.
  #
  # Gated at the job level (rather than per-step) on `check-mobile-changed`
  # so a no-op shows up as skipped, not a false green success.
  testflight:
    name: TestFlight → ${{ inputs.environment }}
    needs: [check-mobile-changed, version]
    if: needs.check-mobile-changed.outputs.changed == 'true'
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    env:
      # Flutter flavor + Apple bundle id differ per env (see apps/mobile/ios/):
      # staging -> "staging" flavor / com.kylebjordahl.igt.staging
      # production -> "prod" flavor / com.kylebjordahl.igt
      FLAVOR: ${{ inputs.environment == 'production' && 'prod' || 'staging' }}
      API_BASE_URL: ${{ inputs.environment == 'production' && 'https://igt.kylebjordahl.com/api' || 'https://staging.igt.kylebjordahl.com/api' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      # macos-latest's default Xcode still lags Apple's App Store Connect
      # SDK requirement (e.g. Xcode 16.4/iOS 18.5 SDK when Apple requires the
      # iOS 26 SDK), so upload-testflight-build fails validation with a 409
      # SDK version error even though the archive/build steps succeed. Pin to
      # the latest stable Xcode on the runner rather than a hardcoded
      # version path, which would go stale the next time the runner image
      # drops an older point release.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Regenerates the gitignored ephemeral iOS project files; the committed
      # flavor pbxproj/xcconfigs survive (same pattern ci.yml relies on).
      - name: Regenerate ephemeral iOS project files
        working-directory: apps/mobile
        run: |
          flutter create . --platforms=ios --project-name caretaker_app
          flutter pub get

      - name: Import distribution signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install App Store provisioning profile
        env:
          PROFILE_BASE64: ${{ inputs.environment == 'production' && secrets.IOS_PROD_PROFILE_BASE64 || secrets.IOS_STAGING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/$FLAVOR-appstore.mobileprovision"

      # Marketing version comes from the `version` job above (shared with the
      # web client build in `deploy`, so both embed the same value for this
      # run) — see its "Determine app version" step for how it's derived.
      - name: Build signed IPA (${{ inputs.environment }})
        working-directory: apps/mobile
        run: |
          flutter build ipa --flavor "$FLAVOR" \
            --export-options-plist "ios/ExportOptions-$FLAVOR.plist" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_ENV="${{ inputs.environment }}" \
            --build-name=${{ needs.version.outputs.build_name }} \
            --build-number=${{ github.run_number }}

      # `github.run_number` is a small monotonic int, satisfying TestFlight's
      # "strictly increasing build number" rule without a fragile round-trip
      # to query the latest existing build.

      # Resolve the glob to a concrete file ourselves: the upload action hands
      # app-path straight to `xcrun altool`, which doesn't do shell-style glob
      # expansion, so a literal `*.ipa` pattern fails with "File does not
      # exist at path: .../*.ipa".
      - name: Locate built IPA
        id: locate-ipa
        working-directory: apps/mobile
        run: |
          ipa_path=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' -print -quit)
          if [ -z "$ipa_path" ]; then
            echo "::error::No .ipa file found in build/ios/ipa"
            exit 1
          fi
          echo "path=apps/mobile/$ipa_path" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.locate-ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
