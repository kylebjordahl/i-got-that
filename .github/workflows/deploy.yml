name: Deploy (reusable)

# Reusable deployment: provision durable infra (Terraform), apply D1 migrations,
# and deploy the Worker (Wrangler) for a given environment. Called by
# deploy-staging.yml (after CI passes on main) and deploy-production.yml
# (release published).
#
# `environment` (staging | production) drives every derived value (wrangler env
# key, D1 name, TF backend). `ref` optionally pins the commit to deploy.

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment — "staging" or "production"
        required: true
        type: string
      ref:
        description: >-
          Git ref/SHA to check out and deploy. Defaults to the standard
          checkout ref. Staging passes the exact commit that passed CI so a
          later push to main can't sneak an unvalidated commit into deploy.
        required: false
        type: string
        default: ""
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      # iOS TestFlight signing/upload. Only used by the `testflight` job,
      # which only runs for `environment: staging` — optional so the
      # production caller (which doesn't pass these yet) still validates.
      IOS_DIST_CERT_P12_BASE64:
        required: false
      IOS_DIST_CERT_PASSWORD:
        required: false
      IOS_STAGING_PROFILE_BASE64:
        required: false
      APP_STORE_CONNECT_KEY_ID:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_API_KEY_P8:
        required: false

jobs:
  deploy:
    name: Deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    # Binds to the GitHub Environment — add required reviewers there to gate
    # production behind a manual approval.
    environment: ${{ inputs.environment }}
    # Everything else is derived from `environment` (staging | production).
    env:
      WRANGLER_ENV: "${{ inputs.environment }}"
      D1_DATABASE: "igt-${{ inputs.environment == 'production' && 'prod' || 'staging' }}"
      TF_BACKEND: "backend.${{ inputs.environment }}.hcl"
    steps:
      - name: Validate environment
        run: |
          if [ "$WRANGLER_ENV" != "staging" ] && [ "$WRANGLER_ENV" != "production" ]; then
            echo "::error::environment must be 'staging' or 'production' (got '$WRANGLER_ENV')."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/pnpm-install

      # Build the Flutter web client and stage it under apps/api/public/app so
      # the Worker serves it (same origin) at /app. API base is the relative
      # /api on that origin. The built bundle is cached and keyed on the mobile
      # sources: a backend/infra-only deploy restores it and skips the Flutter
      # SDK download + web build (the slowest part of the deploy). Only a change
      # under apps/mobile busts the cache and triggers a rebuild.
      - name: Restore built web client
        id: web-client-cache
        uses: actions/cache@v4
        with:
          path: apps/api/public/app
          key: >-
            web-client-${{ hashFiles('apps/mobile/lib/**', 'apps/mobile/web/**',
            'apps/mobile/pubspec.yaml', 'apps/mobile/pubspec.lock') }}
      - uses: subosito/flutter-action@v2
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        with:
          channel: stable
          cache: true
      - name: Build web client
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: |
          flutter create . --platforms=web --project-name caretaker_app
          flutter pub get
          flutter build web --base-href /app/ --dart-define=API_BASE_URL=/api
      - name: Stage web assets
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf apps/api/public/app
          mkdir -p apps/api/public
          cp -r apps/mobile/build/web apps/api/public/app
      # Runs whether the bundle was rebuilt or restored from cache — the Worker
      # must never deploy without its web assets.
      - name: Verify web assets present
        run: |
          if [ ! -f apps/api/public/app/index.html ]; then
            echo "::error::Web assets missing: apps/api/public/app/index.html not found." \
                 "Neither the cache restore nor the Flutter build produced the web" \
                 "client — the Worker would deploy without it. Failing early."
            exit 1
          fi
          echo "Serving $(find apps/api/public/app -type f | wc -l) web asset file(s)."

      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (${{ inputs.environment }} infra)
        working-directory: infra/terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_environment: ${{ inputs.environment }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init -backend-config="$TF_BACKEND"
          terraform apply -auto-approve

      - name: Apply D1 migrations + deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm wrangler d1 migrations apply "$D1_DATABASE" --env "$WRANGLER_ENV" --remote
          pnpm wrangler deploy --env "$WRANGLER_ENV"

  # Archives, signs, and uploads the mobile app's `staging` flavor to
  # TestFlight. Staging-only for now (prod has no real API domain yet — see
  # the note in deploy-production.yml for how to enable it). Needs macOS for
  # Xcode/codesign, so it's a separate job from `deploy` (which stays on
  # ubuntu-latest) rather than an extra step there.
  testflight:
    name: TestFlight → ${{ inputs.environment }}
    if: inputs.environment == 'staging'
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          # Need the parent commit to diff against below.
          fetch-depth: 2

      # Building/signing/uploading is the expensive part of this job (and the
      # reason it needs macOS runners); skip it when this deploy didn't touch
      # the mobile app, e.g. a backend-only merge to main.
      - name: Check for mobile app changes
        id: mobile-changed
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^apps/mobile/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No apps/mobile/** changes in this commit — skipping TestFlight build."
          fi

      - uses: subosito/flutter-action@v2
        if: steps.mobile-changed.outputs.changed == 'true'
        with:
          channel: stable
          cache: true

      # Regenerates the gitignored ephemeral iOS project files; the committed
      # flavor pbxproj/xcconfigs survive (same pattern ci.yml relies on).
      - name: Regenerate ephemeral iOS project files
        if: steps.mobile-changed.outputs.changed == 'true'
        working-directory: apps/mobile
        run: |
          flutter create . --platforms=ios --project-name caretaker_app
          flutter pub get

      - name: Import distribution signing certificate
        if: steps.mobile-changed.outputs.changed == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install App Store provisioning profile
        if: steps.mobile-changed.outputs.changed == 'true'
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "${{ secrets.IOS_STAGING_PROFILE_BASE64 }}" | base64 --decode \
            > "$PROFILE_DIR/staging-appstore.mobileprovision"

      - name: Build signed IPA (staging)
        if: steps.mobile-changed.outputs.changed == 'true'
        working-directory: apps/mobile
        run: |
          flutter build ipa --flavor staging \
            --export-options-plist ios/ExportOptions-staging.plist \
            --dart-define=API_BASE_URL=https://staging.igt.kylebjordahl.com/api \
            --build-number=${{ github.run_number }}

      # `github.run_number` is a small monotonic int, satisfying TestFlight's
      # "strictly increasing build number" rule without a fragile round-trip
      # to query the latest existing build. Marketing version stays whatever
      # `pubspec.yaml`'s `version` says.
      - name: Upload to TestFlight
        if: steps.mobile-changed.outputs.changed == 'true'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: apps/mobile/build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
