name: Deploy (reusable)

# Reusable deployment: provision durable infra (Terraform), apply D1 migrations,
# and deploy the Worker (Wrangler) for a given environment. Called by
# deploy-staging.yml (after CI passes on main) and deploy-production.yml
# (release published).
#
# `environment` (staging | production) drives every derived value (wrangler env
# key, D1 name, TF backend). `ref` optionally pins the commit to deploy.

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment — "staging" or "production"
        required: true
        type: string
      ref:
        description: >-
          Git ref/SHA to check out and deploy. Defaults to the standard
          checkout ref. Staging passes the exact commit that passed CI so a
          later push to main can't sneak an unvalidated commit into deploy.
        required: false
        type: string
        default: ""
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      # iOS TestFlight signing/upload. Only used by the `testflight` job,
      # which only runs for `environment: staging` — optional so the
      # production caller (which doesn't pass these yet) still validates.
      IOS_DIST_CERT_P12_BASE64:
        required: false
      IOS_DIST_CERT_PASSWORD:
        required: false
      IOS_STAGING_PROFILE_BASE64:
        required: false
      APP_STORE_CONNECT_KEY_ID:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_API_KEY_P8:
        required: false

jobs:
  deploy:
    name: Deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    # Binds to the GitHub Environment — add required reviewers there to gate
    # production behind a manual approval.
    environment: ${{ inputs.environment }}
    # Everything else is derived from `environment` (staging | production).
    env:
      WRANGLER_ENV: "${{ inputs.environment }}"
      D1_DATABASE: "igt-${{ inputs.environment == 'production' && 'prod' || 'staging' }}"
      TF_BACKEND: "backend.${{ inputs.environment }}.hcl"
    steps:
      - name: Validate environment
        run: |
          if [ "$WRANGLER_ENV" != "staging" ] && [ "$WRANGLER_ENV" != "production" ]; then
            echo "::error::environment must be 'staging' or 'production' (got '$WRANGLER_ENV')."
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/pnpm-install

      # Build the Flutter web client and stage it under apps/api/public/app so
      # the Worker serves it (same origin) at /app. API base is the relative
      # /api on that origin. The built bundle is cached and keyed on the mobile
      # sources: a backend/infra-only deploy restores it and skips the Flutter
      # SDK download + web build (the slowest part of the deploy). Only a change
      # under apps/mobile busts the cache and triggers a rebuild.
      #
      # --build-number matches the `testflight` job below (same
      # github.run_number), so the build number shown in-app (Me → Help &
      # about) lines up with the TestFlight build for the same workflow run.
      - name: Restore built web client
        id: web-client-cache
        uses: actions/cache@v6
        with:
          path: apps/api/public/app
          key: >-
            web-client-${{ hashFiles('apps/mobile/lib/**', 'apps/mobile/web/**',
            'apps/mobile/pubspec.yaml', 'apps/mobile/pubspec.lock') }}
      - uses: subosito/flutter-action@v2
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        with:
          channel: stable
          cache: true
      - name: Build web client
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: |
          flutter create . --platforms=web --project-name caretaker_app
          flutter pub get
          flutter build web --base-href /app/ --dart-define=API_BASE_URL=/api \
            --build-number=${{ github.run_number }}
      - name: Stage web assets
        if: steps.web-client-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf apps/api/public/app
          mkdir -p apps/api/public
          cp -r apps/mobile/build/web apps/api/public/app
      # Runs whether the bundle was rebuilt or restored from cache — the Worker
      # must never deploy without its web assets.
      - name: Verify web assets present
        run: |
          if [ ! -f apps/api/public/app/index.html ]; then
            echo "::error::Web assets missing: apps/api/public/app/index.html not found." \
                 "Neither the cache restore nor the Flutter build produced the web" \
                 "client — the Worker would deploy without it. Failing early."
            exit 1
          fi
          echo "Serving $(find apps/api/public/app -type f | wc -l) web asset file(s)."

      - uses: hashicorp/setup-terraform@v4
      - name: Terraform apply (${{ inputs.environment }} infra)
        working-directory: infra/terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_environment: ${{ inputs.environment }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init -backend-config="$TF_BACKEND"
          terraform apply -auto-approve

      - name: Apply D1 migrations + deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm wrangler d1 migrations apply "$D1_DATABASE" --env "$WRANGLER_ENV" --remote
          pnpm wrangler deploy --env "$WRANGLER_ENV"

  # Building/signing/uploading in `testflight` below is the expensive part of
  # deploying to TestFlight (and the reason that job needs macOS runners), so
  # decide whether it's needed on a cheap ubuntu runner first. Nx-affected is
  # base/head aware (unlike a plain path grep) and understands the project
  # graph, so it correctly catches mobile changes spread across several
  # commits, not just the most recent one.
  check-mobile-changed:
    name: Check for mobile app changes
    if: inputs.environment == 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      changed: ${{ steps.mobile-changed.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          # Full history: the last successful TestFlight build may be many
          # commits back, and Nx needs both ends of the range locally.
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-install

      # Walk "Deploy staging" runs newest-first and find the most recent one
      # whose `testflight` job actually succeeded (as opposed to no-op'd —
      # see the job-level `if` below, a no-op reports as skipped, not
      # success). That run's commit is the last point we know TestFlight is
      # up to date, so it's the right base for the Nx-affected diff below.
      - name: Find commit of last successful TestFlight build
        id: base-sha
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BASE_SHA=""
          for run_id in $(gh api "repos/${REPO}/actions/workflows/deploy-staging.yml/runs?status=completed&per_page=30" --jq '.workflow_runs[].id'); do
            conclusion=$(gh api "repos/${REPO}/actions/runs/${run_id}/jobs" \
              --jq '[.jobs[] | select(.name | endswith("TestFlight → staging"))][0].conclusion // empty')
            if [ "$conclusion" = "success" ]; then
              BASE_SHA=$(gh api "repos/${REPO}/actions/runs/${run_id}" --jq '.head_sha')
              break
            fi
          done
          if [ -z "$BASE_SHA" ]; then
            echo "No prior successful TestFlight build found — building unconditionally."
          else
            echo "Last successful TestFlight build was for commit $BASE_SHA."
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Check whether mobile is Nx-affected since that build
        id: mobile-changed
        run: |
          set -euo pipefail
          BASE_SHA="${{ steps.base-sha.outputs.base_sha }}"
          if [ -z "$BASE_SHA" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD_SHA="$(git rev-parse HEAD)"
          affected=$(pnpm exec nx show projects --affected --base="$BASE_SHA" --head="$HEAD_SHA" --json)
          echo "Nx-affected projects since $BASE_SHA: $affected"
          if echo "$affected" | jq -e 'index("mobile") != null' > /dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "mobile is not Nx-affected since the last successful TestFlight build — skipping."
          fi

  # Archives, signs, and uploads the mobile app's `staging` flavor to
  # TestFlight. Staging-only for now (prod signing assets + ExportOptions
  # aren't set up yet — see the note in deploy-production.yml for how to
  # enable it). Needs macOS for Xcode/codesign, so it's a separate job from
  # `deploy` (which stays on ubuntu-latest) rather than an extra step there.
  #
  # Gated at the job level (rather than per-step) on `check-mobile-changed`
  # so a no-op shows up as skipped, not a false green success.
  testflight:
    name: TestFlight → ${{ inputs.environment }}
    needs: check-mobile-changed
    if: inputs.environment == 'staging' && needs.check-mobile-changed.outputs.changed == 'true'
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      # macos-latest's default Xcode still lags Apple's App Store Connect
      # SDK requirement (e.g. Xcode 16.4/iOS 18.5 SDK when Apple requires the
      # iOS 26 SDK), so upload-testflight-build fails validation with a 409
      # SDK version error even though the archive/build steps succeed. Pin to
      # the latest stable Xcode on the runner rather than a hardcoded
      # version path, which would go stale the next time the runner image
      # drops an older point release.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Regenerates the gitignored ephemeral iOS project files; the committed
      # flavor pbxproj/xcconfigs survive (same pattern ci.yml relies on).
      - name: Regenerate ephemeral iOS project files
        working-directory: apps/mobile
        run: |
          flutter create . --platforms=ios --project-name caretaker_app
          flutter pub get

      - name: Import distribution signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install App Store provisioning profile
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "${{ secrets.IOS_STAGING_PROFILE_BASE64 }}" | base64 --decode \
            > "$PROFILE_DIR/staging-appstore.mobileprovision"

      - name: Build signed IPA (staging)
        working-directory: apps/mobile
        run: |
          flutter build ipa --flavor staging \
            --export-options-plist ios/ExportOptions-staging.plist \
            --dart-define=API_BASE_URL=https://staging.igt.kylebjordahl.com/api \
            --build-number=${{ github.run_number }}

      # `github.run_number` is a small monotonic int, satisfying TestFlight's
      # "strictly increasing build number" rule without a fragile round-trip
      # to query the latest existing build. Marketing version stays whatever
      # `pubspec.yaml`'s `version` says.

      # Resolve the glob to a concrete file ourselves: the upload action hands
      # app-path straight to `xcrun altool`, which doesn't do shell-style glob
      # expansion, so a literal `*.ipa` pattern fails with "File does not
      # exist at path: .../*.ipa".
      - name: Locate built IPA
        id: locate-ipa
        working-directory: apps/mobile
        run: |
          ipa_path=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' -print -quit)
          if [ -z "$ipa_path" ]; then
            echo "::error::No .ipa file found in build/ios/ipa"
            exit 1
          fi
          echo "path=apps/mobile/$ipa_path" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.locate-ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
