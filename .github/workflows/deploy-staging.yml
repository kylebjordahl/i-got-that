name: Deploy staging

# Continuous deployment to STAGING after CI passes on main. Gated on the CI
# workflow rather than firing on the raw push, so a red main never deploys.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  # Shared with deploy-production.yml: if a production release is published
  # while a staging deploy is in flight (or vice versa), the later one queues
  # behind the earlier one instead of racing it. deploy-production.yml's
  # verify job relies on this — it only needs to poll briefly for event lag,
  # not sit through an entire in-progress staging deploy.
  group: deploy
  cancel-in-progress: false

jobs:
  staging:
    # Only deploy when the triggering CI run actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # Reusable-workflow jobs are capped by the caller's grant, not just their
    # own request: deploy.yml's `check-mobile-changed` job calls the GitHub
    # API to find the last successful TestFlight run, which needs `actions:
    # read` here or the call fails validation even though that job's `if`
    # would otherwise skip it.
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      # Deploy the exact commit CI validated, not whatever main's HEAD is now.
      ref: ${{ github.event.workflow_run.head_sha }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
      IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
      IOS_STAGING_PROFILE_BASE64: ${{ secrets.IOS_STAGING_PROFILE_BASE64 }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}

  # If a release was cut for this commit ahead of staging looking good — a
  # draft release with target_commitish pinned to this SHA — publishing it
  # here fires the `release: published` event, which is deploy-production.yml's
  # trigger. That gets this commit to production without a human having to
  # come back and flip the draft after watching staging succeed.
  #
  # Needs `staging` (not just runs after it): default `if: success()` means a
  # failed or skipped staging deploy never publishes anything.
  publish-pending-release:
    name: Publish draft release for the deployed commit
    needs: staging
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release targeting this commit, if any
        uses: actions/github-script@v7
        with:
          script: |
            // Draft releases don't create their tag until published, so the
            // commit they're pinned to lives in target_commitish, not a
            // resolvable git ref — hence the listing/scan rather than a
            // tag lookup.
            const sha = context.payload.workflow_run.head_sha;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find((r) => r.draft && r.target_commitish === sha);
            if (!release) {
              core.info(`No draft release targets ${sha} — nothing to publish.`);
              return;
            }
            core.info(`Publishing draft release '${release.tag_name}' (id ${release.id}) for commit ${sha}.`);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
